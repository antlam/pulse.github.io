<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jane Pulse - AI-Powered Business Insights</title>
    <!-- Swap to Proxima Nova later -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Brand - Teal */
            --brand-05: #eafafb;
            --brand-50: #00c1ca;
            --brand-60: #00b1b8;
            --brand-70: #00989e;
            
            /* Discovery - Purple */
            --discovery-50: #ab6de1;
            --discovery-60: #722ed1;
            
            /* Critical - Red */
            --critical-50: #ff4b3a;
            --critical-60: #db2b2a;
            --critical-70: #b71d29;
            
            /* Success - Green */
            --success-50: #33d653;
            --success-60: #25b650;
            
            /* Warning - Yellow */
            --warning-50: #fba919;
            --warning-60: #d78812;
            
            /* Neutral */
            --neutral-05: #fcfdfd;
            --neutral-10: #f9fafa;
            --neutral-20: #ebeeee;
            --neutral-30: #dde2e2;
            --neutral-50: #bcc6c6;
            --neutral-70: #798d8e;
            --neutral-90: #344243;
            --neutral-100: #161c1d;
            --white: #ffffff;
            
            /* Spacing */
            --space-05x: 2px;
            --space-1x: 4px;
            --space-2x: 8px;
            --space-3x: 12px;
            --space-4x: 16px;
            --space-5x: 20px;
            --space-6x: 24px;
            --space-7x: 28px;
            --space-8x: 32px;
            --space-9x: 36px;
            --space-10x: 40px;
            
            /* Border radius */
            --radius-sm: var(--space-05x);  /* 2px */
            --radius-md: var(--space-1x);   /* 4px - buttons, cards, panels */
            --radius-lg: var(--space-2x);   /* 8px - badges */
            
            /* Border */
            --border-width: 1px;
            --border-default: var(--neutral-30);
            --border-input: var(--neutral-50);
            --border-critical: var(--critical-70);
            --border-divider: var(--neutral-30);
            
            /* Text colors */
            --text-default: var(--neutral-100);
            --text-subdued: var(--neutral-70);
            --text-disabled: var(--neutral-50);
            --text-link: var(--brand-60);
            --text-link-hover: var(--brand-70);
            
            /* Semantic */
            --bg: var(--neutral-05);
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-default);
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 var(--space-6x);
        }

        header {
            padding: var(--space-8x) 0;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--brand-50);
            text-decoration: none;
        }

        .hero {
            padding: var(--space-10x) 0 calc(var(--space-10x) * 3);
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: var(--space-5x);
            color: var(--text-default);
        }

        .hero p {
            font-size: 1.125rem;
            color: var(--text-subdued);
            margin-bottom: var(--space-10x);
            line-height: 1.7;
        }

        .waitlist-form {
            display: flex;
            gap: var(--space-3x);
            justify-content: center;
            flex-wrap: wrap;
        }

        .waitlist-form input {
            flex: 1;
            min-width: 220px;
            padding: var(--space-3x) var(--space-4x);
            border: var(--border-width) solid var(--border-input);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: inherit;
            background: var(--white);
        }

        .waitlist-form input:focus {
            outline: none;
            border-color: var(--brand-50);
        }

        .btn {
            padding: var(--space-3x) var(--space-6x);
            background: var(--brand-50);
            color: var(--neutral-100);
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--brand-60);
        }

        .form-note {
            margin-top: var(--space-4x);
            font-size: 0.875rem;
            color: var(--text-subdued);
        }

        footer {
            background: var(--brand-50);
            padding: calc(var(--space-10x) * 2) 0 var(--space-10x);
            text-align: center;
        }

        .footer-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 var(--space-6x);
        }

        .footer-logo {
            display: inline-block;
            margin-bottom: var(--space-8x);
        }

        .footer-logo img {
            height: 48px;
            width: auto;
        }

        .footer-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: var(--space-4x) var(--space-8x);
            margin-bottom: var(--space-8x);
        }

        .footer-nav a {
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .footer-nav a:hover {
            opacity: 0.8;
        }

        .footer-divider {
            width: 100%;
            max-width: 500px;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 auto var(--space-8x);
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: var(--space-6x);
            margin-bottom: var(--space-8x);
        }

        .footer-social a {
            color: var(--white);
            transition: opacity 0.2s;
        }

        .footer-social a:hover {
            opacity: 0.8;
        }

        .footer-social svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .footer-copyright {
            font-size: 0.875rem;
            color: var(--white);
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }

            .waitlist-form {
                flex-direction: column;
            }

            .waitlist-form input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

    <script>
        document.getElementById('waitlist-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input').value;
            alert('Thanks! We\'ll be in touch at ' + email);
            this.querySelector('input').value = '';
        });
    </script>
