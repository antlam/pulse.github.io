<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jane Pulse - AI-Powered Business Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Brand - Teal */
            --brand-05: #eafafb;
            --brand-50: #00c1ca;
            --brand-60: #00b1b8;
            --brand-70: #00989e;
            
            /* Discovery - Purple */
            --discovery-50: #ab6de1;
            --discovery-60: #722ed1;
            
            /* Critical - Red */
            --critical-50: #ff4b3a;
            --critical-60: #db2b2a;
            
            /* Success - Green */
            --success-50: #33d653;
            --success-60: #25b650;
            
            /* Warning - Yellow */
            --warning-50: #fba919;
            --warning-60: #d78812;
            
            /* Neutral */
            --neutral-05: #fcfdfd;
            --neutral-10: #f9fafa;
            --neutral-20: #ebeeee;
            --neutral-50: #bcc6c6;
            --neutral-70: #798d8e;
            --neutral-90: #344243;
            --neutral-100: #161c1d;
            --white: #ffffff;
            
            /* Semantic */
            --text-dark: var(--neutral-100);
            --text-secondary: var(--neutral-70);
            --bg: var(--neutral-05);
            --border: var(--neutral-20);
        }

        body {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            padding: 32px 0;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--brand-50);
            text-decoration: none;
        }

        .hero {
            padding: 80px 0 120px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .hero p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        .waitlist-form {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .waitlist-form input {
            flex: 1;
            min-width: 220px;
            padding: 14px 18px;
            border: 1px solid var(--neutral-50);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--white);
        }

        .waitlist-form input:focus {
            outline: none;
            border-color: var(--brand-50);
        }

        .btn {
            padding: 14px 28px;
            background: var(--brand-50);
            color: var(--neutral-100);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--brand-60);
        }

        .form-note {
            margin-top: 16px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        footer {
            padding: 40px 0;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }

            .waitlist-form {
                flex-direction: column;
            }

            .waitlist-form input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="#" class="logo">Jane Pulse</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>AI-powered insights for your clinic</h1>
                <p>Connect your Jane account and get a clear view of your revenue, scheduling, and patient retention — in plain language.</p>
                
                <form class="waitlist-form" id="waitlist-form">
                    <input type="email" placeholder="Enter your email" required>
                    <button type="submit" class="btn">Join Waitlist</button>
                </form>
                <p class="form-note">We'll let you know when it's ready.</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            © 2026 Jane Pulse
        </div>
    </footer>

    <script>
        document.getElementById('waitlist-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input').value;
            alert('Thanks! We\'ll be in touch at ' + email);
            this.querySelector('input').value = '';
        });
    </script>
</body>
</html>
